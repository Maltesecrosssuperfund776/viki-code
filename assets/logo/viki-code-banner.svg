<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VIKI Code banner</title>
  <desc id="desc">A minimal light-theme banner for VIKI Code with warm neutral tones and restrained product styling.</desc>
  <defs>
