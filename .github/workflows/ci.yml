name: viki-ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Test
        run: pytest -q

  bootstrap-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Universal install
        run: python scripts/install.py --path . --dev
      - name: CLI smoke on Unix
        if: runner.os != 'Windows'
        run: |
          ./.venv/bin/python -m viki.cli up . --dry-run
          ./.venv/bin/python -m viki.cli integrations status
          ./.venv/bin/python -m viki.cli skills templates .
      - name: CLI smoke on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m viki.cli up . --dry-run
          .\.venv\Scripts\python.exe -m viki.cli integrations status
          .\.venv\Scripts\python.exe -m viki.cli skills templates .
