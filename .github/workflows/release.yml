name: viki-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
          zip -r viki-code-release.zip . -x '.git/*' '.venv/*' '__pycache__/*' '.pytest_cache/*'
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: viki-release-artifacts
          path: |
            dist/*
            viki-code-release.zip
